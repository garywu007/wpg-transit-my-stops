<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#222">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- <script src="./mockData.js"></script> -->

    <title>Bus Ride Live</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            background-color: #222;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .panel1 {
            background: #222;

            flex-direction: column;
            align-items: stretch;
            /* make children full width */
            justify-content: flex-start;
            /* stack from top */
            padding: 10px;
            gap: 10px;
            color: #eee;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 0.8em;
        }

        .title {
            gap: 10px;
            border-top-left-radius: 5em;
            border-bottom-left-radius: 5em;
            background: linear-gradient(to right, #3b559e, #222);
            color: #b5c5f2;
        }

        .title span {
            flex: 1;
            text-align: center;
            margin-right: 2em;
        }

        .route span {
            flex: 1;
            text-align: center;
            border-radius: 1em;
            font-weight: bold;
            box-shadow: 0 0 10px 2px #eee;
            border: 2px solid black;
            background-color: black;
            color: darkgray;
        }

        .destination span,
        .nextstopName span {
            flex: 1;
            text-align: center;
            padding: 0.1em;
            border-left: 2px solid #444;
            border-top: 2px solid #444;
            border-right: 2px solid #666;
            border-bottom: 2px solid #666;
            background-color: #111;
            color: darkgoldenrod;
        }

        /* .nextstopName span {
            flex: 1;
            text-align: center;
            font-weight: bold;
        } */

        .nextstop span {
            flex: 1;
            text-align: center;
            color: #aaa;
            /* border-radius: 1em; */
            /* box-shadow: 0 0 10px 2px #eee; */
            /* border: 2px solid #333; */
        }

        .panel2 {
            display: flex;
            justify-content: center;
            align-items: center;

            perspective: 600px;
            /* 👈 enables 3D effect */
        }

        .cylinder {
            position: relative;
            width: 70%;
            height: 200px;

            transform-style: preserve-3d;
        }

        .cylinder-item {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: white;
            top: 50%;
            left: 0;
            transform-origin: center center -100px;
        }

        .cylinder-item:nth-child(1) {
            transform: rotateX(320deg) translateZ(120px) translateY(-60%);
            color: #444;
        }

        .cylinder-item:nth-child(2) {
            transform: rotateX(340deg) translateZ(120px) translateY(-60%);
            color: #555;
        }

        .cylinder-item:nth-child(3) {
            transform: rotateX(0deg) translateZ(120px) translateY(-60%);
            font-weight: bold;
            font-size: 23px;
            color: goldenrod;
            animation: flash 5s steps(1) infinite;
        }

        .cylinder-item:nth-child(4) {
            transform: rotateX(20deg) translateZ(120px) translateY(-60%);
            color: #888;
            /* font-weight: bold; */
        }

        .cylinder-item:nth-child(5) {
            transform: rotateX(40deg) translateZ(120px) translateY(-60%);
            color: #555;
            /* font-weight: bold; */
        }

        /* .cylinder-item:nth-child(6) {
            transform: rotateX(348deg) translateZ(120px) translateY(-60%);
            font-weight: bold;
            font-size: 25px;
            color: darkgoldenrod;
            animation: flash 1s steps(1) infinite;
        } */

        @keyframes flash {
            0% {
                opacity: 1;
            }

            10% {
                opacity: 0.8;
            }

            20% {
                opacity: 1;
            }

            30% {
                opacity: 0.8;
            }

            40% {
                opacity: 1;
            }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.5);

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 1000;
        }

        .hidden {
            display: none;
        }

        .modal-content {
            background: #888;
            padding: 20px;
            border-radius: 10px;
            width: 300px;

            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input {
            padding: 10px;

            border-left: 2px solid #444;
            border-top: 2px solid #444;
            border-right: 2px solid #666;
            border-bottom: 2px solid #666;
            background-color: #111;
            color: darkgoldenrod;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-actions button {
            padding: 8px 12px;
            cursor: pointer;
        }

        .dialpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .dialpad button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #ccc;
            cursor: pointer;
        }

        .dialpad button:active {
            background: #ccc;
            color: black;
        }

        #ok_button {
            background-color: darkgreen;
        }

        #ok_button:disabled {
            background: #003700;
            color: black;
        }

        #busIdInput {
            text-align: center;
            font-size: 20px;
            padding: 10px;
        }

        /* Portrait (vertical): stack top & bottom */
        @media (orientation: portrait) {
            .container {
                flex-direction: column;
            }

            .panel2 {
                background: linear-gradient(#222 0%, #333 5%);
            }

            .item:not(:first-child) {
                margin-top: 0.5em;
            }
        }

        /* Landscape (horizontal): side by side */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
            }

            .panel2 {
                background: linear-gradient(to right, #222 0%, #333 5%, #333 95%, #222 100%);
            }

            .item:not(:first-child) {
                margin-top: 0.3em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="panel panel1">
            <div class="item title" onclick="openModal()">
                <img src="https://info.winnipegtransit.com/assets/1027/Winnipeg_Transit_Round_Blue_Logo_bigger.png" />
                <span>BUS: ---</span>
            </div>
            <div class="item route">
                <span>---</span>
            </div>
            <div class="item destination" onclick="safetyBelt()">
                <span>---</span>
            </div>
            <div class="item nextstop" onclick="refreshNextStop()">
                <span><small><i>NEXT STOP</i></small></span>
                <span style="background: darkgoldenrod; color: black; border-radius: 1em;">0 km</span>
            </div>
            <div class="item nextstopName">
                <span>---</span>
            </div>
        </div>
        <div class="panel panel2">
            <div class="cylinder">
                <div class="cylinder-item"></div>
                <div class="cylinder-item"></div>
                <div class="cylinder-item"></div>
                <div class="cylinder-item"></div>
                <div class="cylinder-item"></div>
                <!-- <div class="cylinder-item">^^^</div> -->
            </div>
        </div>
    </div>
    <div id="busModal" class="modal hidden">
        <div class="modal-content">
            <h2>Set Bus ID</h2>

            <!-- Display (no OS keyboard) -->
            <input type="text" id="busIdInput" readonly placeholder="Enter Bus ID" />

            <!-- Dial Pad -->
            <div class="dialpad">
                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>

                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>

                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>

                <button id="c_button" onclick="clearInput()" style="background-color: darkred;">Close</button>
                <button onclick="press('0')">0</button>
                <button id="ok_button" onclick="saveBusId()" disabled>OK</button>
            </div>
        </div>
    </div>
</body>
<script>
    let stops_data = [];
    let stop_seq = -1;
    let timer;
    let nextstop_distance = 999;

    function openModal() {
        clearInterval(timer);
        document.getElementById('busModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('busModal').classList.add('hidden');
    }

    function press(val) {
        const input = document.getElementById('busIdInput');
        if (input.value.length < 3) {
            input.value += val;
        }
        document.getElementById('c_button').innerHTML = "Clear";
        document.getElementById('ok_button').disabled = false;
    }

    function clearInput() {
        if (document.getElementById('busIdInput').value !== '') {
            document.getElementById('busIdInput').value = '';
            document.getElementById('c_button').innerHTML = "Close";
            document.getElementById('ok_button').disabled = true;
        } else {
            closeModal();
        }
    }

    function saveBusId() {
        let bus_id = `000${document.getElementById('busIdInput').value}`.slice(-3);

        if (bus_id) {
            loadData(bus_id);
            closeModal();
            document.getElementById('c_button').innerHTML = "Close";
            document.getElementById('ok_button').disabled = true;
            document.getElementById('busIdInput').value = '';
        }
    }

    async function fetchData(bus_id) {
        try {
            const response = await fetch(`https://winnipegtransit.com/api/v2/trips/schedule?bus_id=${bus_id}&live=true`);

            if (!response.ok) {
                throw new Error('HTTP error: ' + response.status);
            }

            const tripInfo = await response.json();
            return tripInfo;
        } catch (error) {
            console.error(error);
        }

        return -1;
    }

    async function loadData(bus_id) {
        let tripInfo = await fetchData(bus_id);

        if (tripInfo === -1) return;

        textSpeech("zh-HK", "現在出發");

        document.querySelector('.title > span').textContent = `BUS: ${tripInfo.busId}`;
        document.querySelector('.route > span').textContent = tripInfo.route.id;
        document.querySelector('.route > span').style.border = `2px solid ${tripInfo.route.badgeStyle.borderColor}`;
        document.querySelector('.route > span').style.backgroundColor = tripInfo.route.badgeStyle.backgroundColor;
        document.querySelector('.route > span').style.color = tripInfo.route.badgeStyle.color;
        document.querySelector('.destination > span').textContent = tripInfo.variant.name;

        stops_data = tripInfo.scheduledStops;

        stop_seq = await setStartStop(stops_data);
        document.querySelector('.nextstopName > span').innerHTML = formatStopName(stops_data[stop_seq].name);

        const cylinder_items = document.querySelectorAll('.cylinder-item');

        for (let i = 0; i < 5; i++) {
            if (stop_seq - 2 + i < 0 || stop_seq - 2 + i >= stops_data.length) {
                cylinder_items[i].innerHTML = "";
            } else {
                cylinder_items[i].innerHTML = formatStopName(stops_data[stop_seq - 2 + i].name);
            }
        }

        timer = setInterval(getDistance, 100);
    }

    //getDistance
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Earth radius in km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; // distance in km
    }

    function getDistance() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    let targetLat = stops_data[stop_seq].position.lat;
                    let targetLon = stops_data[stop_seq].position.lng;

                    const distance = calculateDistance(userLat, userLon, targetLat, targetLon);

                    if (distance < nextstop_distance) {
                        nextstop_distance = distance;
                        document.querySelector('.nextstop > span:nth-of-type(2)').innerHTML = `${distance.toFixed(2)} km`;
                        // document.querySelector('.destination > span').textContent =  new Date().toLocaleTimeString();
                    } else {
                        if (nextstop_distance < 0.06) {
                            refreshNextStop();
                        } else {
                            nextstop_distance = distance;
                            document.querySelector('.nextstop > span:nth-of-type(2)').innerHTML = `${distance.toFixed(2)} km`;
                            // document.querySelector('.destination > span').textContent =  new Date().toLocaleTimeString();
                        }
                    }

                    // console.log(`distince: ${distance.toFixed(3)} to stop: ${stop_seq} @[${targetLat}, ${targetLon}]`);
                },
                (error) => {
                    console.log("Error: " + error.message);
                }
            );
        } else {
            console.log("Geolocation is not supported.");
        }
    }

    function setStartStop(stops_data) {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject("Geolocation is not supported.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;
                    let min_distance = 999;
                    let closest_stop_seq = -1;
                    // let stops_distance = "";

                    // call your existing calculateDistance function
                    for (const [idx, stop] of stops_data.entries()) {
                        let stop_lat = stop.position.lat;
                        let stop_lon = stop.position.lng;

                        try {
                            let distance = calculateDistance(userLat, userLon, stop_lat, stop_lon);
                            if (distance < min_distance) {
                                closest_stop_seq = idx;
                                min_distance = distance;
                            }

                        } catch (err) {
                            console.log("Error getting distance for", stop.name, ":", err);
                        }
                    };
                    resolve(closest_stop_seq);
                },
                (error) => {
                    reject(error.message);
                }
            );
        });
    }

    function formatStopName(stopName) {
        // Map full direction to single-letter code
        const directionMap = {
            Northbound: 'N',
            Southbound: 'S',
            Eastbound: 'E',
            Westbound: 'W'
        };

        // Split only at the first space after the direction
        const firstSpaceIndex = stopName.indexOf(' ');
        if (firstSpaceIndex === -1) return stopName; // no space found

        const directionWord = stopName.slice(0, firstSpaceIndex);
        const rest = stopName.slice(firstSpaceIndex + 1);

        const dirLetter = directionMap[directionWord] || directionWord;

        // Split the rest at ' at ' if exists
        const parts = rest.split(' at ');
        if (parts.length === 2) {
            return `<small>${dirLetter}. ${parts[0]}</small><br>${parts[1]}`;
        } else {
            return `<small>${dirLetter}.</small> ${rest}`;
        }
    }

    function refreshNextStop() {
        if (stop_seq < stops_data.length - 1) {
            stop_seq += 1;

            document.querySelector('.nextstopName > span').innerHTML = formatStopName(stops_data[stop_seq].name);

            const cylinder_items = document.querySelectorAll('.cylinder-item');

            for (let i = 0; i < 5; i++) {
                if (stop_seq - 2 + i < 0 || stop_seq - 2 + i >= stops_data.length) {
                    cylinder_items[i].innerHTML = "";
                } else {
                    cylinder_items[i].innerHTML = formatStopName(stops_data[stop_seq - 2 + i].name);
                }
            }

            nextstop_distance = 999;

            textSpeech("en-US", `next stop: ${stops_data[stop_seq].name.split(' at ')[1]}${stop_seq === (stops_data.length - 1) ? ", the last stop of this ride, good bye and good luck!" : ""}`);
        }
    }

    function safetyBelt() {
        textSpeech("zh-HK", "收工好啊！歡迎搭乘你家嘅車，請扣好安全帶");
    }

    function textSpeech(lang, content) {
        window.speechSynthesis.cancel();
        const message = new SpeechSynthesisUtterance(content);
        message.lang = lang; // Language
        message.rate = 1;       // Speed (0.1 to 10)
        message.pitch = 1;      // Tone (0 to 2)
        message.volume = 1;     // Volume (0 to 1)
        window.speechSynthesis.speak(message);
    }

</script>

</html>
